name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Locate MSBuild
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found"
          }

          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) {
            throw "MSBuild.exe not found"
          }

          "MSBUILD_PATH=$msbuild" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using MSBuild: $msbuild"

      - name: Build
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          & "$env:MSBUILD_PATH" /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} ${{ env.SOLUTION_FILE_PATH }}

      - name: Collect artifact files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Get-ChildItem "bin/Release-x64/*.dll" | Copy-Item -Destination artifact -Force
          Copy-Item "mhypbase.ini" artifact -Force
          Copy-Item "README.md" artifact -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mhypbase-latest
          path: artifact
          if-no-files-found: error
